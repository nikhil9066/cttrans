<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>CT Transit Ticket</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f9fafb;
            background: -webkit-linear-gradient(top, #f9fafb, #e5e7eb);
            background: linear-gradient(to bottom, #f9fafb, #e5e7eb);
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            -webkit-box-pack: center;
            -webkit-justify-content: center;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            background: white;
            border-radius: 24px;
            -webkit-box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            padding: 32px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 32px;
            height: 32px;
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            -webkit-box-pack: center;
            -webkit-justify-content: center;
            justify-content: center;
            color: #666;
            border: none;
            background: none;
            font-size: 24px;
            cursor: pointer;
        }

        .header h1 {
            font-size: 36px;
            font-weight: bold;
            color: #111;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 18px;
            color: #666;
        }

        .ring-container {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-pack: center;
            -webkit-justify-content: center;
            justify-content: center;
            margin: 48px 0;
            position: relative;
        }

        .ring-outer {
            position: relative;
            width: 250px;
            height: 250px;
        }

        /* Gray glow shadow layer */
        .glow-shadow {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(180, 180, 180, 0.4), transparent 70%);
            -webkit-animation: glow-fade 2s ease-in-out infinite;
            animation: glow-fade 2s ease-in-out infinite;
        }

        @-webkit-keyframes glow-fade {
            0% {
                opacity: 0;
                -webkit-transform: scale(0.95);
                transform: scale(0.95);
            }
            25% {
                opacity: 0;
                -webkit-transform: scale(0.95);
                transform: scale(0.95);
            }
            37.5% {
                opacity: 1;
                -webkit-transform: scale(1.05);
                transform: scale(1.05);
            }
            50% {
                opacity: 0;
                -webkit-transform: scale(0.95);
                transform: scale(0.95);
            }
            100% {
                opacity: 0;
                -webkit-transform: scale(0.95);
                transform: scale(0.95);
            }
        }

        @keyframes glow-fade {
            0% {
                opacity: 0;
                -webkit-transform: scale(0.95);
                transform: scale(0.95);
            }
            25% {
                opacity: 0;
                -webkit-transform: scale(0.95);
                transform: scale(0.95);
            }
            37.5% {
                opacity: 1;
                -webkit-transform: scale(1.05);
                transform: scale(1.05);
            }
            50% {
                opacity: 0;
                -webkit-transform: scale(0.95);
                transform: scale(0.95);
            }
            100% {
                opacity: 0;
                -webkit-transform: scale(0.95);
                transform: scale(0.95);
            }
        }

        .pulse-ring {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            background: #40916a;
            -webkit-animation: exact-heartbeat 2s ease-in-out infinite;
            animation: exact-heartbeat 2s ease-in-out infinite;
        }

        /* EXACT heartbeat pattern from video */
        @-webkit-keyframes exact-heartbeat {
            0% {
                background: #40916a;
                -webkit-transform: scale(1);
                transform: scale(1);
            }
            12.5% {
                background: #46a075;
                -webkit-transform: scale(1.03);
                transform: scale(1.03);
            }
            25% {
                background: #46a075;
                -webkit-transform: scale(1.03);
                transform: scale(1.03);
            }
            37.5% {
                background: #2f6a4d;
                -webkit-transform: scale(0.97);
                transform: scale(0.97);
            }
            50% {
                background: #40916a;
                -webkit-transform: scale(1);
                transform: scale(1);
            }
            62.5% {
                background: #46a075;
                -webkit-transform: scale(1.02);
                transform: scale(1.02);
            }
            75% {
                background: #40916a;
                -webkit-transform: scale(1);
                transform: scale(1);
            }
            87.5% {
                background: #46a075;
                -webkit-transform: scale(1.03);
                transform: scale(1.03);
            }
            100% {
                background: #40916a;
                -webkit-transform: scale(1);
                transform: scale(1);
            }
        }

        @keyframes exact-heartbeat {
            0% {
                background: #40916a;
                -webkit-transform: scale(1);
                transform: scale(1);
            }
            12.5% {
                background: #46a075;
                -webkit-transform: scale(1.03);
                transform: scale(1.03);
            }
            25% {
                background: #46a075;
                -webkit-transform: scale(1.03);
                transform: scale(1.03);
            }
            37.5% {
                background: #2f6a4d;
                -webkit-transform: scale(0.97);
                transform: scale(0.97);
            }
            50% {
                background: #40916a;
                -webkit-transform: scale(1);
                transform: scale(1);
            }
            62.5% {
                background: #46a075;
                -webkit-transform: scale(1.02);
                transform: scale(1.02);
            }
            75% {
                background: #40916a;
                -webkit-transform: scale(1);
                transform: scale(1);
            }
            87.5% {
                background: #46a075;
                -webkit-transform: scale(1.03);
                transform: scale(1.03);
            }
            100% {
                background: #40916a;
                -webkit-transform: scale(1);
                transform: scale(1);
            }
        }

        .ring-inner {
            position: absolute;
            top: 32px;
            left: 32px;
            right: 32px;
            bottom: 32px;
            border-radius: 50%;
            background: white;
            -webkit-box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            -webkit-box-pack: center;
            -webkit-justify-content: center;
            justify-content: center;
            z-index: 1;
        }

        .logo {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            gap: 4px;
        }

        .logo-icon {
            width: 8px;
            height: 8px;
            background: #2563eb;
            -webkit-transform: rotate(45deg);
            transform: rotate(45deg);
        }

        .logo-text {
            font-size: 20px;
            color: #111;
        }

        .logo-bold {
            font-weight: bold;
        }

        .time-display {
            text-align: center;
            margin-bottom: 32px;
        }

        .time {
            font-size: 56px;
            font-weight: bold;
            color: #111;
            letter-spacing: -1px;
        }

        .ticket-info {
            background: #f9fafb;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #e5e7eb;
        }

        .ticket-info h2 {
            font-size: 24px;
            font-weight: 600;
            color: #111;
            margin-bottom: 12px;
        }

        .ticket-info .description {
            font-size: 16px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .ticket-info .expiration {
            font-size: 18px;
            font-weight: 600;
            color: #111;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="close-btn">✕</button>

        <div class="header">
            <h1>CTtransit</h1>
            <p>Show operator your ticket</p>
        </div>

        <div class="ring-container">
            <div class="ring-outer">
                <div class="glow-shadow"></div>
                <div class="pulse-ring"></div>
                <div class="ring-inner">
                    <div class="logo">
                        <div class="logo-icon"></div>
                        <span class="logo-text"><span class="logo-bold">CT</span>transit</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="time-display">
            <div class="time" id="current-time">Loading...</div>
        </div>

        <div class="ticket-info">
            <h2>Adult 2 Hour - Local Service</h2>
            <p class="description">Hartford, New Haven, Stamford, Bristol, Meriden, New Britain, Wallingford, and Waterbury</p>
            <p class="expiration" id="expiration-time">Loading...</p>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            function padZero(num) {
                return num < 10 ? '0' + num : num;
            }

            function updateTime() {
                try {
                    var now = new Date();

                    // Format current time
                    var hours = now.getHours();
                    var minutes = now.getMinutes();
                    var seconds = now.getSeconds();
                    var ampm = hours >= 12 ? 'PM' : 'AM';
                    hours = hours % 12;
                    hours = hours ? hours : 12;

                    var timeString = hours + ':' + padZero(minutes) + ':' + padZero(seconds) + ' ' + ampm;

                    var timeElement = document.getElementById('current-time');
                    if (timeElement) {
                        timeElement.textContent = timeString;
                    }

                    // Calculate expiration (2 hours from now)
                    var expDate = new Date(now.getTime() + (2 * 60 * 60 * 1000));
                    var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

                    var expHours = expDate.getHours();
                    var expMinutes = expDate.getMinutes();
                    var expAmpm = expHours >= 12 ? 'PM' : 'AM';
                    expHours = expHours % 12;
                    expHours = expHours ? expHours : 12;

                    var expString = 'Expires ' + months[expDate.getMonth()] + ' ' +
                                  expDate.getDate() + ', ' +
                                  expDate.getFullYear() + ' at ' +
                                  expHours + ':' + padZero(expMinutes) + ' ' + expAmpm;

                    var expElement = document.getElementById('expiration-time');
                    if (expElement) {
                        expElement.textContent = expString;
                    }
                } catch (e) {
                    console.error('Error updating time:', e);
                }
            }

            // Wait for DOM to be ready
            function init() {
                updateTime();
                setInterval(updateTime, 1000);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
